<!DOCTYPE html>
<html>
<head><title>Generate PWA Icons</title></head>
<body>
<h2>Right-click each image below → Save As</h2>
<p>Save as <code>icons/icon-192.png</code> and <code>icons/icon-512.png</code> in the public folder</p>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function draw(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  // Background
  ctx.fillStyle = '#0f0f13';
  const r = s * 0.19;
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, r);
  ctx.fill();
  // Gradient square
  const p = s * 0.08;
  const grad = ctx.createLinearGradient(p, p, s - p, s - p);
  grad.addColorStop(0, '#6366f1');
  grad.addColorStop(1, '#8b5cf6');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(p, p, s - p * 2, s - p * 2, r * 0.75);
  ctx.fill();
  // Letter
  ctx.fillStyle = '#ffffff';
  ctx.font = `800 ${s * 0.55}px Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('F', s / 2, s / 2 + s * 0.03);
}
draw(document.getElementById('c192'));
draw(document.getElementById('c512'));
// Auto-download
['c192','c512'].forEach(id => {
  const c = document.getElementById(id);
  const a = document.createElement('a');
  a.href = c.toDataURL('image/png');
  a.download = `icon-${c.width}.png`;
  a.click();
});
</script>
</body>
</html>
